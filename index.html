<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Finance Manager | App-Edit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', 'Padauk', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .dashboard-hero { background: var(--dark); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .summary-card { padding: 15px; border-radius: 15px; background: #fff; border: 1px solid #edf2f7; text-align: center; }
        .btn-sync { background: #4285F4; color: white; border: none; padding: 10px 18px; border-radius: 50px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; margin: 0 auto 15px; font-weight: 600; }
        .input-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f1f5f9; padding: 20px; border-radius: 20px; }
        .full { grid-column: span 2; }
        input, select, textarea { padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        #recordsPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; padding: 30px; box-sizing: border-box; overflow-y: auto; z-index: 100; }
        .excel-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .excel-table th, .excel-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

<div class="container" id="homePage">
    <button class="btn-sync" onclick="handleAuthClick()">
        <img src="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png" width="20"> Google Drive နှင့် ချိတ်မည်
    </button>

    <div class="dashboard-hero">
        <div style="font-size: 13px; opacity: 0.8; margin-bottom: 5px;">စုစုပေါင်းလက်ကျန်ငွေ</div>
        <div style="font-size: 36px; font-weight: 800;" id="displayBalance">0 Ks</div>
        <button onclick="showPage('recordsPage')" style="background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 12px; margin-top: 15px;">စာရင်းအသေးစိတ်ကြည့်မည် →</button>
    </div>

    <div class="summary-grid">
        <div class="summary-card">
            <div style="font-size: 11px; color: #64748b;">ဝင်ငွေ (INCOME)</div>
            <div id="sumIncome" style="color: var(--success); font-weight: 700; font-size: 18px;">0 Ks</div>
        </div>
        <div class="summary-card">
            <div style="font-size: 11px; color: #64748b;">ထွက်ငွေ (EXPENSE)</div>
            <div id="sumExpense" style="color: var(--danger); font-weight: 700; font-size: 18px;">0 Ks</div>
        </div>
    </div>

    <div style="height: 180px; margin-bottom: 25px;"><canvas id="myChart"></canvas></div>

    <div class="input-form">
        <select id="type"><option value="income">ဝင်ငွေ (+)</option><option value="expense">ထွက်ငွေ (-)</option></select>
        <select id="category"><option value="စားသောက်စရိတ်">စားသောက်စရိတ်</option><option value="အထွေထွေ">အထွေထွေ</option><option value="လစာ">လစာ</option></select>
        <input type="number" id="amount" placeholder="ပမာဏ" class="full">
        <textarea id="note" placeholder="မှတ်စု..." class="full" rows="1"></textarea>
        <button class="btn-main full" onclick="addData()">စာရင်းသွင်းမည်</button>
    </div>
</div>

<div id="recordsPage">
    <button onclick="showPage('homePage')" style="padding: 10px 20px; border-radius: 10px; cursor: pointer;">← ရှေ့သို့ပြန်သွားမည်</button>
    <h2 style="margin-top: 25px;">ငွေစာရင်းအသေးစိတ် (Excel Table)</h2>
    <table class="excel-table">
        <thead><tr style="background: #f8fafc;"><th>ရက်စွဲ</th><th>အမျိုးအစား</th><th>မှတ်စု</th><th>ပမာဏ</th><th>ဖျက်ရန်</th></tr></thead>
        <tbody id="excelBody"></tbody>
    </table>
</div>

<script>
    // === CONFIGURATION ===
    const CLIENT_ID = '333590112476-29g9dh2dcvfi37n8ubp5htdfk5u3pcv1.apps.googleusercontent.com'
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    let tokenClient;
    let records = JSON.parse(localStorage.getItem('finance_v5')) || [];
    let myChart;

    // === GOOGLE DRIVE SYNC ===
    function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({}); }); }
    function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '', }); }

    async function handleAuthClick() {
        tokenClient.callback = async (resp) => { if (resp.error !== undefined) throw (resp); await saveToDrive(); };
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    async function saveToDrive() {
        const content = JSON.stringify(records);
        const metadata = { 'name': 'finance_backup.json', 'mimeType': 'application/json' };
        const file = new Blob([content], {type: 'application/json'});
        const formData = new FormData();
        formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
        formData.append('file', file);
        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST', headers: new Headers({'Authorization': 'Bearer ' + gapi.client.getToken().access_token}), body: formData
        });
        alert("Google Drive ပေါ်သို့ စာရင်းများကို Backup လုပ်ပြီးပါပြီ။");
    }

    // === CORE LOGIC ===
    function addData() {
        const amtInput = document.getElementById('amount');
        const amt = parseFloat(amtInput.value);
        if(!amt) return alert("ပမာဏထည့်ပါ");
        records.push({ id: Date.now(), date: new Date().toLocaleDateString('en-GB'), type: document.getElementById('type').value, category: document.getElementById('category').value, note: document.getElementById('note').value || '-', amount: amt });
        localStorage.setItem('finance_v5', JSON.stringify(records));
        amtInput.value = ''; updateUI();
    }

    function updateUI() {
        let bal = 0, inc = 0, exp = 0;
        records.forEach(r => { if(r.type==='income'){ bal+=r.amount; inc+=r.amount; } else { bal-=r.amount; exp+=r.amount; } });
        document.getElementById('displayBalance').innerText = `${bal.toLocaleString()} Ks`;
        document.getElementById('sumIncome').innerText = `${inc.toLocaleString()} Ks`;
        document.getElementById('sumExpense').innerText = `${exp.toLocaleString()} Ks`;
        drawChart(inc, exp);
    }

    function renderExcel() {
        document.getElementById('excelBody').innerHTML = records.map(r => `
            <tr>
                <td>${r.date}</td><td>${r.category}</td><td>${r.note}</td>
                <td style="color:${r.type==='income'?'green':'red'}; font-weight:bold;">${r.amount.toLocaleString()} MMK</td>
                <td><button onclick="deleteRecord(${r.id})" style="color:red; border:none; background:none; cursor:pointer;">✕</button></td>
            </tr>`).join('');
    }

    function deleteRecord(id) {
        if(confirm("ဖျက်မှာ သေချာပါသလား?")) { records = records.filter(r => r.id !== id); localStorage.setItem('finance_v5', JSON.stringify(records)); updateUI(); renderExcel(); }
    }

    function drawChart(i, e) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['ဝင်ငွေ', 'ထွက်ငွေ'], datasets: [{ data: [i, e], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, cutout: '75%' } });
    }

    function showPage(id) { document.getElementById('homePage').style.display = (id==='homePage')?'block':'none'; document.getElementById('recordsPage').style.display = (id==='recordsPage')?'block':'none'; if(id==='recordsPage') renderExcel(); }

    updateUI();
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
