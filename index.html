<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Finance Manager + Drive</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --primary: #6366f1; --income: #22c55e; --expense: #ef4444; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        .dark-mode { --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { background: var(--card); width: 100%; max-width: 700px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .btn-icon { cursor: pointer; border: 1px solid #ddd; background: var(--card); color: var(--text); padding: 8px 12px; border-radius: 10px; }
        .drive-btn { background: #4285F4; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .balance-card { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .summary-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 10px; background: var(--card); color: var(--text); }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; cursor: pointer; }
        .excel-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .excel-table th, .excel-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .no-print { display: block; }
        @media print { .no-print { display: none; } body { background: white; color: black; } .container { max-width: 100%; box-shadow: none; } }
        #recordsPage { display: none; }
        .income-text { color: var(--income); }
        .expense-text { color: var(--expense); }
    </style>
</head>
<body>

<div class="container no-print" id="homePage">
    <div class="header">
        <select id="currency" style="width: auto; margin:0;" onchange="updateUI()">
            <option value="Ks">Ks</option><option value="$">$</option><option value="฿">฿</option>
        </select>
        <div>
            <button class="btn-icon" onclick="toggleDarkMode()">🌙</button>
            <button class="btn-icon" onclick="toggleLang()" id="langBtn">EN</button>
        </div>
    </div>

    <button id="authBtn" class="drive-btn" onclick="handleAuthClick()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" width="20">
        <span id="driveText">Sync with Google Drive</span>
    </button>

    <div class="balance-card">
        <p id="totalTitle">စုစုပေါင်းလက်ကျန်ငွေ</p>
        <h1 id="totalBalance">0 Ks</h1>
        <button onclick="showPage('recordsPage')" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:8px; border-radius:50px; cursor:pointer;">အသေးစိတ်ကြည့်မည် →</button>
    </div>

    <div class="summary-grid">
        <div class="summary-box"><p id="incTitle">ဝင်ငွေ</p><h3 class="income-text" id="totalInc">0 Ks</h3></div>
        <div class="summary-box"><p id="expTitle">ထွက်ငွေ</p><h3 class="expense-text" id="totalExp">0 Ks</h3></div>
    </div>

    <div style="height: 200px; display: flex; justify-content: center; margin-bottom: 20px;">
        <canvas id="myChart"></canvas>
    </div>

    <select id="type"><option value="income">ဝင်ငွေ (+)</option><option value="expense">ထွက်ငွေ (-)</option></select>
    <select id="category">
        <option value="စားသောက်">စားသောက်</option><option value="အထွေထွေ">အထွေထွေ</option>
        <option value="လစာ">လစာ</option><option value="ကျန်းမာရေး">ကျန်းမာရေး</option>
    </select>
    <input type="number" id="amount" placeholder="ပမာဏ">
    <input type="text" id="note" placeholder="မှတ်ချက်...">
    <button class="btn-main" onclick="addData()" id="saveBtn">စာရင်းသွင်းမည်</button>
</div>

<div class="container" id="recordsPage">
    <div class="no-print">
        <button onclick="showPage('homePage')" style="margin-bottom:10px; cursor:pointer;">← ရှေ့သို့</button>
        <h2 id="tableTitle">ငွေစာရင်းအသေးစိတ်</h2>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="search" placeholder="ရှာဖွေရန်..." oninput="renderTable()" style="margin:0;">
            <input type="date" id="filterDate" onchange="renderTable()" style="margin:0; width: 150px;">
        </div>
        <div style="background: #f1f5f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; color: #1e293b;">
            <strong>ဇယားအတွင်း စုစုပေါင်း: </strong> <span id="tableSum" class="income-text">0 Ks</span>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table class="excel-table">
            <thead>
                <tr><th>ရက်စွဲ</th><th>အမျိုးအစား</th><th>ပမာဏ</th><th>မှတ်ချက်</th><th class="no-print">Action</th></tr>
            </thead>
            <tbody id="excelBody"></tbody>
        </table>
    </div>
    
    <div class="no-print" style="margin-top: 20px;">
        <button class="btn-main" onclick="window.print()">Print ထုတ်မည် (စာရွက် Size ရွေးရန်)</button>
        <button onclick="clearData()" style="color:red; background:none; border:none; margin-top:20px; cursor:pointer;">ဒေတာအားလုံးဖျက်မည်</button>
    </div>
</div>

<script>
    // === CONFIGURATION ===
    const CLIENT_ID = '333590112476-29g9dh2dcvfi37n8ubp5htdfk5u3pcv1.apps.googleusercontent.com'; 
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    
    let records = JSON.parse(localStorage.getItem('finance_pro_v2')) || [];
    let myChart;
    let tokenClient;
    let gapiInited = false;
    let gsiInited = false;

    // --- Google Auth Functions ---
    function gapiLoaded() { gapi.load('client', intializeGapiClient); }
    async function intializeGapiClient() { await gapi.client.init({ }); gapiInited = true; }
    function gsiLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => { if (resp.access_token) saveToDrive(); },
        });
        gsiInited = true;
    }
    function handleAuthClick() {
        if (CLIENT_ID === 'ဒီနေရာမှာ_မင်းရဲ့_Client_ID_ပြန်ထည့်ပါ') return alert("ကျေးဇူးပြု၍ Google Client ID အရင်ထည့်ပေးပါဗျ။");
        tokenClient.requestAccessToken({prompt: 'consent'});
    }

    async function saveToDrive() {
        const fileContent = JSON.stringify(records);
        const metadata = { name: 'finance_backup.json', mimeType: 'application/json' };
        const formData = new FormData();
        formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        formData.append('file', new Blob([fileContent], { type: 'application/json' }));

        try {
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { Authorization: `Bearer ${gapi.client.getToken().access_token}` }, body: formData
            });
            alert("Google Drive သို့ သိမ်းဆည်းပြီးပါပြီ။");
        } catch (err) { alert("Drive သို့ သိမ်းရာတွင် အမှားအယွင်းရှိခဲ့သည်။"); }
    }

    // --- App Logic ---
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleLang() { currentLang = (currentLang === 'my' ? 'en' : 'my'); updateUI(); }

    function updateUI() {
        const cur = document.getElementById('currency').value;
        const income = records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
        const expense = records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
        document.getElementById('totalBalance').innerText = `${(income - expense).toLocaleString()} ${cur}`;
        document.getElementById('totalInc').innerText = `${income.toLocaleString()} ${cur}`;
        document.getElementById('totalExp').innerText = `${expense.toLocaleString()} ${cur}`;
        renderTable();
        updateChart();
    }

    function addData() {
        const amt = parseFloat(document.getElementById('amount').value);
        if(!amt) return;
        records.push({ id: Date.now(), date: new Date().toISOString().split('T')[0], type: document.getElementById('type').value, category: document.getElementById('category').value, amount: amt, note: document.getElementById('note').value });
        localStorage.setItem('finance_pro_v2', JSON.stringify(records));
        document.getElementById('amount').value = '';
        updateUI();
    }

    function renderTable() {
        const body = document.getElementById('excelBody');
        const search = document.getElementById('search').value.toLowerCase();
        const fDate = document.getElementById('filterDate').value;
        const cur = document.getElementById('currency').value;
        body.innerHTML = '';
        let filtered = records.filter(r => (r.category.includes(search) || r.note.includes(search)) && (!fDate || r.date === fDate));
        let tSum = 0;
        filtered.forEach(r => {
            tSum += (r.type === 'income' ? r.amount : -r.amount);
            body.innerHTML += `<tr><td>${r.date}</td><td>${r.category}</td><td class="${r.type}-text">${r.type === 'income' ? '+' : '-'}${r.amount.toLocaleString()}</td><td>${r.note}</td><td class="no-print"><button onclick="deleteData(${r.id})">🗑</button></td></tr>`;
        });
        document.getElementById('tableSum').innerText = `${tSum.toLocaleString()} ${cur}`;
    }

    function deleteData(id) { if(confirm("ဖျက်မှာလား?")) { records = records.filter(r => r.id !== id); localStorage.setItem('finance_pro_v2', JSON.stringify(records)); updateUI(); } }

    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const cats = [...new Set(records.map(r => r.category))];
        const data = cats.map(c => records.filter(r => r.category === c && r.type === 'expense').reduce((s, r) => s + r.amount, 0));
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: cats, datasets: [{ data: data, backgroundColor: ['#6366f1', '#22c55e', '#ef4444', '#f59e0b'] }] }, options: { maintainAspectRatio: false } });
    }

    function showPage(id) {
        document.getElementById('homePage').style.display = id === 'homePage' ? 'block' : 'none';
        document.getElementById('recordsPage').style.display = id === 'recordsPage' ? 'block' : 'none';
    }

    function clearData() { if(confirm("အကုန်ဖျက်မှာလား?")) { records = []; localStorage.clear(); updateUI(); } }

    window.onload = () => { updateUI(); gapiLoaded(); gsiLoaded(); };
</script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gsiLoaded()"></script>
</body>
</html>
