<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Finance Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --primary: #6366f1; --income: #22c55e; --expense: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lang-btn { cursor: pointer; border: 1px solid #ddd; background: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .drive-btn { background: #4285F4; color: white; border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .balance-card { background: #0f172a; color: white; padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 20px; position: relative; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .summary-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #f1f5f9; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .btn-main:hover { opacity: 0.9; }
        
        /* Excel Table Styles */
        .excel-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .excel-table th, .excel-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .excel-table th { background: #f1f5f9; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; border: none; }
        .print-btn { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        #recordsPage { display: none; }
        .income-text { color: var(--income); font-weight: bold; }
        .expense-text { color: var(--expense); font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="homePage">
    <div class="header">
        <select id="currency" style="width: auto; margin:0;" onchange="updateUI()">
            <option value="Ks">Ks (MMK)</option>
            <option value="$">$ (USD)</option>
            <option value="฿">฿ (THB)</option>
        </select>
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">English</button>
    </div>

    <button id="authBtn" class="drive-btn" onclick="handleAuthClick()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" width="20">
        <span id="driveText">Google Drive နှင့် ချိတ်မည်</span>
    </button>

    <div class="balance-card">
        <p id="totalTitle" style="color: #94a3b8; font-size: 14px;">စုစုပေါင်းလက်ကျန်ငွေ</p>
        <h1 id="totalBalance">0 Ks</h1>
        <button onclick="showPage('recordsPage')" style="background: rgba(255,255,255,0.1); border:none; color:white; padding: 5px 15px; border-radius: 50px; cursor:pointer;">စာရင်းအသေးစိတ်ကြည့်မည် →</button>
    </div>

    <div class="summary-grid">
        <div class="summary-box">
            <p id="incTitle" style="font-size: 12px; color: #64748b; margin:0;">ဝင်ငွေ (INCOME)</p>
            <h3 class="income-text" id="totalInc">0 Ks</h3>
        </div>
        <div class="summary-box">
            <p id="expTitle" style="font-size: 12px; color: #64748b; margin:0;">ထွက်ငွေ (EXPENSE)</p>
            <h3 class="expense-text" id="totalExp">0 Ks</h3>
        </div>
    </div>

    <select id="type">
        <option value="income" id="optInc">ဝင်ငွေ (+)</option>
        <option value="expense" id="optExp">ထွက်ငွေ (-)</option>
    </select>

    <select id="category">
        <option value="စားသောက်စရိတ်">စားသောက်စရိတ်</option>
        <option value="အထွေထွေ">အထွေထွေ</option>
        <option value="လစာ">လစာ</option>
    </select>

    <input type="number" id="amount" placeholder="ပမာဏ">
    <textarea id="note" placeholder="မှတ်စု..." rows="1"></textarea>
    <button class="btn-main" onclick="addData()" id="saveBtn">စာရင်းသွင်းမည်</button>
</div>

<div class="container" id="recordsPage">
    <button onclick="showPage('homePage')" style="margin-bottom: 15px; cursor: pointer;">← ရှေ့သို့ပြန်သွားမည်</button>
    <h2 id="tableTitle">ငွေစာရင်းအသေးစိတ်</h2>
    
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="filterTable('all', this)">အားလုံး</button>
        <button class="tab-btn" onclick="filterTable('income', this)">ဝင်ငွေ</button>
        <button class="tab-btn" onclick="filterTable('expense', this)">ထွက်ငွေ</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="excel-table">
            <thead>
                <tr>
                    <th id="thDate">ရက်စွဲ</th>
                    <th id="thCat">အမျိုးအစား</th>
                    <th id="thAmount">ပမာဏ</th>
                    <th id="thNote">မှတ်ချက်</th>
                </tr>
            </thead>
            <tbody id="excelBody"></tbody>
        </table>
    </div>
    
    <button class="print-btn" onclick="window.print()" id="printBtn">Print ထုတ်မည် / PDF သိမ်းမည်</button>
    <button onclick="clearData()" style="color:red; background:none; border:none; margin-top: 20px; cursor:pointer;">ဒေတာအားလုံးဖျက်မည်</button>
</div>

<script>
    const CLIENT_ID = '333590112476-29g9dh2dcvfi37n8ubp5htdfk5u3pcv1.apps.googleusercontent.com'; // Google Drive ချိတ်ချင်ရင် ဒီမှာ ID ပြန်ထည့်ပါ
    let records = JSON.parse(localStorage.getItem('finance_v5')) || [];
    let currentLang = 'my';

    const langData = {
        my: { drive: "Google Drive နှင့် ချိတ်မည်", total: "စုစုပေါင်းလက်ကျန်ငွေ", inc: "ဝင်ငွေ", exp: "ထွက်ငွေ", save: "စာရင်းသွင်းမည်", table: "ငွေစာရင်းအသေးစိတ်", print: "Print ထုတ်မည် / PDF သိမ်းမည်", date: "ရက်စွဲ", cat: "အမျိုးအစား", note: "မှတ်ချက်", amount: "ပမာဏ" },
        en: { drive: "Sync with Drive", total: "Total Balance", inc: "Income", exp: "Expense", save: "Add Record", table: "Financial Details", print: "Print / Save PDF", date: "Date", cat: "Category", note: "Note", amount: "Amount" }
    };

    function toggleLang() {
        currentLang = currentLang === 'my' ? 'en' : 'my';
        document.getElementById('langBtn').innerText = currentLang === 'my' ? 'English' : 'မြန်မာ';
        updateUI();
    }

    function updateUI() {
        const cur = document.getElementById('currency').value;
        const l = langData[currentLang];
        document.getElementById('driveText').innerText = l.drive;
        document.getElementById('totalTitle').innerText = l.total;
        document.getElementById('incTitle').innerText = l.inc;
        document.getElementById('expTitle').innerText = l.exp;
        document.getElementById('saveBtn').innerText = l.save;
        document.getElementById('tableTitle').innerText = l.table;
        document.getElementById('printBtn').innerText = l.print;
        document.getElementById('thDate').innerText = l.date;
        document.getElementById('thCat').innerText = l.cat;
        document.getElementById('thAmount').innerText = l.amount;
        document.getElementById('thNote').innerText = l.note;
        
        let income = records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
        let expense = records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
        
        document.getElementById('totalBalance').innerText = `${(income - expense).toLocaleString()} ${cur}`;
        document.getElementById('totalInc').innerText = `${income.toLocaleString()} ${cur}`;
        document.getElementById('totalExp').innerText = `${expense.toLocaleString()} ${cur}`;
        renderTable('all');
    }

    function addData() {
        const amount = parseFloat(document.getElementById('amount').value);
        if(!amount) return alert("ပမာဏထည့်ပါ");
        
        records.push({
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            amount: amount,
            note: document.getElementById('note').value
        });
        
        localStorage.setItem('finance_v5', JSON.stringify(records));
        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
        updateUI();
    }

    function renderTable(filter) {
        const body = document.getElementById('excelBody');
        body.innerHTML = '';
        let filtered = filter === 'all' ? records : records.filter(r => r.type === filter);
        
        filtered.forEach(r => {
            body.innerHTML += `
                <tr>
                    <td>${r.date}</td>
                    <td>${r.category}</td>
                    <td class="${r.type}-text">${r.type === 'income' ? '+' : '-'}${r.amount.toLocaleString()}</td>
                    <td>${r.note}</td>
                </tr>`;
        });
    }

    function filterTable(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable(type);
    }

    function showPage(id) {
        document.getElementById('homePage').style.display = id === 'homePage' ? 'block' : 'none';
        document.getElementById('recordsPage').style.display = id === 'recordsPage' ? 'block' : 'none';
    }

    function clearData() { if(confirm("သေချာသလား?")) { records = []; localStorage.clear(); updateUI(); } }

    window.onload = updateUI;
</script>

</body>
</html>
